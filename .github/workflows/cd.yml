
name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Go toolchain
        uses: actions/setup-go@v5
        with:
           go-version: "1.25.1"

      - name: Build app
        run: ./scripts/buildprod.sh

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Show build command
        run: echo "gcloud builds submit --tag us-central1-docker.pkg.dev/aerobic-orbit-496518-e0/notely/notely:latest ."

      - name: Build and push Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/aerobic-orbit-496518-e0/notely/notely:latest .
